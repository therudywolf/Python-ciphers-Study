name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: compileall
        run: PYTHONDONTWRITEBYTECODE=1 python -m compileall -q cipher_suite GUI tests
      - name: pytest
        run: pytest -q
